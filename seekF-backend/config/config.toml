[mainConfig]
appName = "seekF"
host = "0.0.0.0"
port = 8000

[authConfig]
# mode: "redis"(默认，不透明token+redis会话) 或 "jwt"(JWT+Redis校验)
mode = "redis"
# 会话过期时间（分钟）。不填/<=0 时，将回退使用 jwtConfig.expireMinutes
sessionExpireMinutes = 1440

[jwtConfig]
secret = ""
expireMinutes = 1440
issuer = "seekF-backend"

[mysqlConfig]
host = "127.0.0.1"
port = 3306
user = "root"
password = ""
databaseName = "seekf"

[redisConfig]
host = "127.0.0.1"
port = 6379
password = ""
db = 0

[authCodeConfig]
accessKeyID = ""
accessKeySecret = ""
signName = "阿里云短信测试"
templateCode = "SMS_154950909"

[ossConfig]
accessKeyID = ""
accessKeySecret = ""
region = "cn-shenzhen"
bucket = "seekf"
baseURL = "https://seekf.oss-cn-shenzhen.aliyuncs.com"

[logConfig]
logDir = "./logs"       # 日志目录
maxAge = 30             # 保留旧日志的最大天数
rotationTime = 24       # 轮转间隔（小时）

[kafkaConfig]
hostPort = "127.0.0.1:9092" # "127.0.0.1:9092,127.0.0.1:9093,127.0.0.1:9094" 多个kafka服务器
loginTopic = "login"
chatTopic = "chat_message"
aiChatTopic = "ai_chat_message"
aiCommentTopic = "ai_comment_reply"
logoutTopic = "logout"
partition = 0 # kafka partition
timeout = 1 # 单位秒

[staticSrcConfig]
staticAvatarPath = "./static/avatars"
staticFilePath = "./static/files"

[aiModelConfig]
deepseekApiKey = ""
deepseekModel = ""
deepseekBaseUrl = ""
deepseekMaxTokens = 65536

qwenApiKey = ""
qwenModel = ""
qwenBaseUrl = ""
qwenMaxTokens = 131072

glmApiKey = ""
glmModel = ""
glmBaseUrl = ""
glmMaxTokens = 131072
glm4vModel = ""
glm4vMaxTokens = 131072

qwenLocalApiKey = ""
qwenLocalModel = ""
qwenLocalBaseUrl = ""
qwenLocalMaxTokens = 4096

glmEmbeddingModel = ""
ttsModel = "glm-tts"
ttsVoice = "chuichui"

# 多模态模型列表（支持图片输入的模型）
multimodalModels = ["glm-4v", "qwen-local"]


[qdrantConfig]
host = "localhost"
port = 6334

[seniverseConfig]
apiKey = ""

[exchangeRateConfig]
apiKey = ""

[tavilyConfig]
apiKey = ""

[esConfig]
addresses = "http://localhost:9200"
username = ""
password = ""